<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FractalEngine - Interactive 3D Fractal Generator</title>
    <style>
      :root {
        --sidebar-width: 350px;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
          Ubuntu, Cantarell, 'Helvetica Neue', sans-serif;
        background: #000;
        color: #fff;
        overflow: hidden;
      }
      #app {
        width: 100vw;
        height: 100vh;
        display: flex;
      }
      #canvas {
        flex: 1;
      }
      #controls {
        width: var(--sidebar-width);
        background: rgba(0, 0, 0, 0.8);
        border-left: 1px solid #444;
        padding: 20px;
        overflow-y: auto;
        font-size: 13px;
      }
      .control-group {
        margin-bottom: 20px;
        border-bottom: 1px solid #333;
        padding-bottom: 15px;
      }
      .control-group h3 {
        font-size: 14px;
        margin-bottom: 10px;
        color: #0ff;
      }
      label {
        display: block;
        margin-bottom: 8px;
      }
      input[type='text'],
      input[type='number'],
      input[type='range'],
      select {
        width: 100%;
        padding: 6px;
        margin-top: 4px;
        background: #222;
        border: 1px solid #444;
        color: #fff;
        font-size: 12px;
      }
      input[type='range'] {
        padding: 0;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        background: #0ff;
        color: #000;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
        margin-top: 10px;
        transition: background 0.2s;
      }
      button:hover {
        background: #0dd;
      }

      /* Drag handle — hidden on desktop, visible on mobile */
      .drag-handle {
        display: none;
      }

      /* Toggle button — hidden on desktop */
      #controls-toggle {
        display: none;
        position: fixed;
        z-index: 20;
        background: #0ff;
        color: #000;
        border: none;
        cursor: pointer;
        font-weight: bold;
        font-size: 22px;
        line-height: 1;
        padding: 0;
        margin: 0;
        width: auto;
      }

      /* Backdrop overlay — hidden by default */
      .controls-backdrop {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9;
      }
      .controls-backdrop.visible {
        display: block;
      }

      /* ===== Tablet (600px-1023px): collapsible side panel ===== */
      @media (min-width: 600px) and (max-width: 1023px) {
        #canvas {
          flex: 1;
          width: 100%;
          height: 100vh;
        }
        #controls {
          position: fixed;
          right: 0;
          top: 0;
          height: 100vh;
          width: 320px;
          transform: translateX(100%);
          transition: transform 0.3s ease;
          z-index: 10;
          border-left: 1px solid #444;
          background: rgba(0, 0, 0, 0.95);
          font-size: 14px;
        }
        #controls.controls-open {
          transform: translateX(0);
        }
        #controls-toggle {
          display: block;
          top: 12px;
          right: 12px;
          width: 44px;
          height: 44px;
          border-radius: 8px;
          font-size: 22px;
        }

        /* WCAG touch targets for tablet */
        input[type='text'],
        input[type='number'],
        select {
          min-height: 44px;
          font-size: 14px;
          padding: 8px;
        }
        button {
          min-height: 44px;
          font-size: 14px;
        }
        input[type='range'] {
          min-height: 44px;
        }

        /* Fluid grid layout for control groups */
        .control-group {
          display: grid;
          grid-template-columns: 1fr;
          gap: 8px;
        }
        .control-group h3 {
          grid-column: 1 / -1;
          font-size: 15px;
        }
      }

      /* ===== Mobile (<600px): bottom drawer ===== */
      @media (max-width: 599px) {
        #canvas {
          flex: 1;
          width: 100%;
          height: 100vh;
        }
        #controls {
          position: fixed;
          bottom: 0;
          left: 0;
          width: 100%;
          max-height: 60vh;
          transform: translateY(100%);
          transition: transform 0.3s ease;
          border-radius: 16px 16px 0 0;
          z-index: 10;
          border-left: none;
          border-top: 1px solid #444;
          background: rgba(0, 0, 0, 0.95);
          padding: 8px 16px 20px;
          font-size: 15px;
        }
        #controls.controls-open {
          transform: translateY(0);
        }
        #controls-toggle {
          display: block;
          bottom: 16px;
          right: 16px;
          width: 52px;
          height: 52px;
          border-radius: 50%;
          font-size: 24px;
          box-shadow: 0 2px 8px rgba(0, 255, 255, 0.4);
        }

        /* Drag handle visible on mobile */
        .drag-handle {
          display: flex;
          justify-content: center;
          align-items: center;
          padding: 10px 0 6px;
          cursor: grab;
          touch-action: none;
        }
        .drag-handle span {
          display: block;
          width: 40px;
          height: 4px;
          border-radius: 2px;
          background: #666;
        }

        /* WCAG touch targets for mobile */
        input[type='text'],
        input[type='number'],
        select {
          min-height: 44px;
          font-size: 15px;
          padding: 10px;
          border-radius: 6px;
        }

        /* Full-width buttons with 48px min height */
        button {
          width: 100%;
          min-height: 48px;
          font-size: 15px;
          padding: 12px 16px;
          border-radius: 8px;
        }

        /* Larger range input on mobile */
        input[type='range'] {
          min-height: 44px;
          padding: 8px 0;
          -webkit-appearance: none;
          appearance: none;
          background: transparent;
        }
        input[type='range']::-webkit-slider-runnable-track {
          height: 6px;
          background: #444;
          border-radius: 3px;
        }
        input[type='range']::-webkit-slider-thumb {
          -webkit-appearance: none;
          appearance: none;
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: #0ff;
          border: 2px solid #fff;
          margin-top: -19px;
          cursor: pointer;
        }
        input[type='range']::-moz-range-track {
          height: 6px;
          background: #444;
          border-radius: 3px;
          border: none;
        }
        input[type='range']::-moz-range-thumb {
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: #0ff;
          border: 2px solid #fff;
          cursor: pointer;
        }

        /* Fluid grid layout for control groups */
        .control-group {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
          gap: 10px;
          margin-bottom: 16px;
          padding-bottom: 12px;
        }
        .control-group h3 {
          grid-column: 1 / -1;
          font-size: 15px;
        }
        label {
          margin-bottom: 4px;
        }
        .control-group h3 {
          margin-bottom: 6px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas"></div>
      <div id="controls"></div>
    </div>
    <button id="controls-toggle" aria-label="Toggle controls panel">&#9776;</button>
    <div class="controls-backdrop" id="controls-backdrop"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
